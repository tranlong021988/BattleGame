name: Deploy Web Build to Pages

on:
  push:
    branches: ["main"] # Thay bằng tên branch chính của bạn (main hoặc master)

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web-mobile  # Đường dẫn tới bản build của bạn
          publish_branch: gh-pages
          force_orphan: true
