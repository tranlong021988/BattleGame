<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Cocos Creator | BattleGame</title>

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>

  <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>

  <!--fix fireball/issues/3568 -->
  <!--<meta name="browsermode" content="application">-->
  <meta name="x5-page-mode" content="app">

  <!--<link rel="apple-touch-icon" href=".png" />-->
  <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

  <link rel="stylesheet" type="text/css" href="style.css"/>

</head>
<body>
  <div id="GameDiv">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
      </div>
    </div>


<!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.js" charset="utf-8"> </script>


<!-- SystemJS support. -->
<script src="src/system.bundle.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    (function () {
        var DESIGN_WIDTH = 720;
        var DESIGN_HEIGHT = 1280;
        var DESIGN_RATIO = DESIGN_WIDTH / DESIGN_HEIGHT;

        window.__applyBattlePortraitLayout = function () {
            var gameDiv = document.getElementById('GameDiv');
            var container = document.getElementById('Cocos3dGameContainer');
            var canvas = document.getElementById('GameCanvas');

            if (!gameDiv || !container || !canvas) {
                return null;
            }

            var viewportWidth = window.innerWidth || document.documentElement.clientWidth || DESIGN_WIDTH;
            var viewportHeight = window.innerHeight || document.documentElement.clientHeight || DESIGN_HEIGHT;
            var width = viewportWidth;
            var height = viewportHeight;

            if (viewportWidth > viewportHeight) {
                height = viewportHeight;
                width = height * DESIGN_RATIO;

                if (width > viewportWidth) {
                    width = viewportWidth;
                    height = width / DESIGN_RATIO;
                }
            }

            width = Math.max(1, Math.floor(width));
            height = Math.max(1, Math.floor(height));

            document.documentElement.style.width = '100%';
            document.documentElement.style.height = '100%';
            document.documentElement.style.overflow = 'hidden';
            document.body.style.width = '100%';
            document.body.style.height = '100%';
            document.body.style.overflow = 'hidden';
            document.body.style.margin = '0';
            document.body.style.display = 'flex';
            document.body.style.alignItems = viewportWidth > viewportHeight ? 'center' : 'stretch';
            document.body.style.justifyContent = viewportWidth > viewportHeight ? 'center' : 'stretch';

            gameDiv.style.width = width + 'px';
            gameDiv.style.height = height + 'px';
            gameDiv.style.maxWidth = '100vw';
            gameDiv.style.maxHeight = '100vh';
            gameDiv.style.flex = '0 0 auto';
            gameDiv.style.overflow = 'hidden';

            container.style.width = '100%';
            container.style.height = '100%';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.width = width;
            canvas.height = height;

            return { width: width, height: height };
        };

        window.__applyBattlePortraitLayout();
        window.addEventListener('resize', function () {
            window.__applyBattlePortraitLayout();
        });
        window.addEventListener('orientationchange', function () {
            setTimeout(window.__applyBattlePortraitLayout, 50);
        });
    }());

    System.import('./index.js').catch(function(err) { console.error(err); })
</script>

</body>
</html>
